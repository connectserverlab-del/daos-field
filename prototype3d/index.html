<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>DAO'S FIELD — Human World I</title>
<style>
  :root{ --ivory:#efe6d2; --bronze:#c79a5b; --amber:#e8b84a; --ink:#07070a;
    --serif:"Cormorant Garamond","Georgia","Songti SC","STSong","Times New Roman",serif; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--ivory);
    font-family:var(--serif);overflow:hidden;overscroll-behavior:none;touch-action:none}
  canvas{display:block;position:fixed;inset:0}
  /* cinematic overlays */
  #cine{position:fixed;inset:0;pointer-events:none;z-index:5}
  #cine .bar{position:absolute;left:0;right:0;height:8vh;background:#000;transition:height .8s ease}
  #cine .bar.top{top:0} #cine .bar.bottom{bottom:0}
  #cine .vig{position:absolute;inset:0;
    background:radial-gradient(130% 110% at 50% 46%,transparent 52%,rgba(0,0,0,.42) 100%)}
  #grain{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}
  /* HUD */
  #hud{position:fixed;inset:0;z-index:7;pointer-events:none;font-family:var(--serif)}
  #loc{position:absolute;top:calc(8vh + 14px);left:50%;transform:translateX(-50%);
    letter-spacing:.36em;text-transform:uppercase;font-size:13px;color:var(--ivory);opacity:0;
    text-shadow:0 2px 14px #000;transition:opacity 1s}
  #hint{position:absolute;bottom:calc(8vh + 12px);left:50%;transform:translateX(-50%);
    font-size:13px;letter-spacing:.05em;color:#cfc7b4;opacity:.0;text-shadow:0 1px 8px #000;
    transition:opacity 1s;text-align:center;padding:0 14px}
  #prompt{position:absolute;bottom:calc(8vh + 46px);left:50%;transform:translateX(-50%);
    font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);opacity:0;
    text-shadow:0 0 16px rgba(232,184,74,.5),0 2px 8px #000;transition:opacity .4s;white-space:nowrap}
  #dev{position:fixed;top:calc(8vh + 4px);left:6px;color:#6f6;font:12px monospace;z-index:9;display:none}
  /* lore card */
  #lore{position:absolute;left:50%;top:50%;transform:translate(-50%,-46%);width:min(560px,86vw);
    text-align:center;opacity:0;transition:opacity .8s;pointer-events:none;z-index:8}
  #lore .ln{letter-spacing:.4em;text-transform:uppercase;color:var(--bronze);font-size:13px;margin-bottom:.5em}
  #lore .lt{font-size:clamp(24px,4.5vw,38px);letter-spacing:.1em;margin:.1em 0 .5em;
    text-shadow:0 2px 20px #000}
  #lore .lb{font-size:clamp(15px,2.6vw,19px);line-height:1.6;color:#e6dcc6;text-shadow:0 1px 10px #000}
  /* touch controls */
  .stick{position:fixed;bottom:calc(8vh + 26px);width:120px;height:120px;border-radius:50%;
    border:1px solid rgba(239,230,210,.25);z-index:7;display:none;touch-action:none}
  #stickL{left:22px} #stickL .nub{position:absolute;left:50%;top:50%;width:52px;height:52px;margin:-26px 0 0 -26px;
    border-radius:50%;background:rgba(239,230,210,.18);border:1px solid rgba(239,230,210,.4)}
  .touch .stick{display:block}
  /* buttons */
  .ui-btn{position:fixed;z-index:8;pointer-events:auto;cursor:pointer;font-family:var(--serif);
    background:linear-gradient(180deg,rgba(199,154,91,.2),rgba(199,154,91,.05));border:1px solid var(--bronze);
    color:var(--ivory);letter-spacing:.1em;border-radius:2px;padding:.5em 1em;font-size:13px;backdrop-filter:blur(2px)}
  #audioBtn{top:calc(8vh + 10px);right:12px}
  /* title / loader */
  #veil{position:fixed;inset:0;z-index:20;background:radial-gradient(120% 100% at 50% 30%,#1a2b30,#05060a);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    transition:opacity 1.2s ease;padding:24px}
  #veil.gone{opacity:0;pointer-events:none}
  #veil .kick{letter-spacing:.5em;text-transform:uppercase;color:var(--bronze);font-size:clamp(11px,2.4vw,14px)}
  #veil h1{font-size:clamp(46px,11vw,104px);letter-spacing:.16em;margin:.06em 0 .1em;font-weight:600;
    text-shadow:0 3px 30px rgba(0,0,0,.8),0 0 50px rgba(232,184,74,.14)}
  #veil .sub{color:#cfc7b4;letter-spacing:.12em;font-size:clamp(15px,2.6vw,20px)}
  #origins{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:1.4em 0 .3em}
  .origin{cursor:pointer;padding:.5em 1em;border:1px solid rgba(199,154,91,.4);border-radius:2px;
    letter-spacing:.1em;font-size:14px;color:#e6dcc6;transition:.25s;display:flex;align-items:center;gap:8px}
  .origin .d{width:.7em;height:.7em;border-radius:50%;box-shadow:0 0 10px currentColor}
  .origin:hover,.origin.sel{border-color:var(--amber);color:var(--ivory);box-shadow:0 0 20px rgba(232,184,74,.25)}
  #enter{margin-top:1.2em;font-size:clamp(15px,2.6vw,18px);letter-spacing:.18em;text-transform:uppercase;
    padding:.7em 1.9em;opacity:.5;pointer-events:none;transition:.3s}
  #enter.ready{opacity:1;pointer-events:auto}
  #load{margin-top:1.3em;color:#9c927e;letter-spacing:.2em;font-size:12px;text-transform:uppercase}
  #foot{position:fixed;bottom:6px;left:0;right:0;z-index:20;text-align:center;color:#8a8172;
    font-size:11px;letter-spacing:.08em;opacity:.6}
  /* ---- AAA HUD ---- */
  #bars{position:fixed;top:calc(8vh + 12px);left:14px;z-index:8;width:212px}
  .bar2{height:12px;border:1px solid rgba(239,230,210,.32);border-radius:7px;overflow:hidden;background:rgba(0,0,0,.45);margin-bottom:6px;position:relative}
  .bar2>i{display:block;height:100%;width:100%;transition:width .18s ease}
  .bar2.hp>i{background:linear-gradient(90deg,#c0392b,#e8623a)} .bar2.qi>i{background:linear-gradient(90deg,#2f6fd0,#3ac9c0)} .bar2.sta>i{background:linear-gradient(90deg,#b8902f,#e8c53a)}
  body.cb .bar2.hp>i{background:linear-gradient(90deg,#d55e00,#e69f00)} body.cb .bar2.qi>i{background:linear-gradient(90deg,#0072b2,#56b4e9)}
  .bar2 span{position:absolute;right:6px;top:-1px;font:9px var(--serif);letter-spacing:.14em;color:#efe6d2;text-shadow:0 1px 2px #000}
  #objective{position:fixed;top:calc(8vh + 76px);left:14px;z-index:8;max-width:240px;color:#e6dcc6;font-size:13px;text-shadow:0 1px 6px #000}
  #objective b{color:var(--amber);letter-spacing:.2em;text-transform:uppercase;font-size:10px;display:block;margin-bottom:2px}
  #minimap{position:fixed;top:calc(8vh + 12px);right:12px;z-index:8;width:130px;height:130px;border:1px solid rgba(199,154,91,.5);border-radius:50%;background:rgba(6,8,10,.6);overflow:hidden}
  #minimap canvas{width:100%;height:100%;display:block}
  #compass{position:fixed;top:8vh;left:50%;transform:translateX(-50%);z-index:8;width:min(440px,72vw);height:26px;overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent);mask-image:linear-gradient(90deg,transparent,#000 14%,#000 86%,transparent)}
  #compass canvas{width:100%;height:100%}
  #targethp{position:fixed;top:calc(8vh + 42px);left:50%;transform:translateX(-50%);z-index:8;width:min(300px,60vw);opacity:0;transition:opacity .3s}
  #targethp .nm{text-align:center;color:#e0a6f0;letter-spacing:.15em;font-size:12px;text-shadow:0 1px 4px #000;margin-bottom:3px;text-transform:uppercase}
  #targethp .bar2>i{background:linear-gradient(90deg,#7a2f8a,#c04ce8)}
  #dmg{position:fixed;inset:0;z-index:9;pointer-events:none;overflow:hidden}
  .dnum{position:absolute;font:700 26px var(--serif);color:#ffd86a;text-shadow:0 2px 6px #000;animation:dfloat 1s ease-out forwards}
  .dnum.crit{color:#ff7a5a;font-size:34px}
  @keyframes dfloat{0%{opacity:0;transform:translateY(0) scale(.7)}18%{opacity:1;transform:translateY(-14px) scale(1.12)}100%{opacity:0;transform:translateY(-56px) scale(1)}}
  .icon-btn{position:fixed;z-index:8;pointer-events:auto;cursor:pointer;width:34px;height:34px;border:1px solid var(--bronze);border-radius:3px;background:rgba(20,16,12,.5);color:var(--ivory);font-size:15px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
  #menuBtn{top:calc(8vh + 10px);right:154px} #photoBtn{top:calc(8vh + 10px);right:194px}
  #banner{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);z-index:9;font:700 clamp(30px,7vw,60px) var(--serif);letter-spacing:.12em;color:var(--ivory);text-shadow:0 3px 24px #000;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
  /* pause / settings */
  #pause{position:fixed;inset:0;z-index:30;background:rgba(6,7,10,.82);backdrop-filter:blur(6px);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;font-family:var(--serif)}
  #pause.on{display:flex}
  #pause h2{font-size:clamp(26px,5vw,42px);letter-spacing:.16em;margin:0 0 .4em;color:var(--ivory)}
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
  .tab{cursor:pointer;padding:.4em 1em;border:1px solid var(--line);border-radius:2px;color:#cfc7b4;letter-spacing:.08em;font-size:13px}
  .tab.sel{border-color:var(--amber);color:var(--ivory)}
  .panel{display:none;width:min(470px,94vw)} .panel.sel{display:block}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 4px;border-bottom:1px solid rgba(199,154,91,.14);color:#e6dcc6;font-size:14px}
  .row input[type=range]{width:150px;accent-color:var(--amber)}
  .row select,.row button.opt{background:rgba(0,0,0,.3);color:#efe6d2;border:1px solid var(--line);border-radius:2px;padding:.3em .6em;font-family:var(--serif);font-size:13px;cursor:pointer}
  .row .val{min-width:44px;text-align:right;color:var(--amber);font-size:12px}
  .pbtns{display:flex;gap:10px;margin-top:16px;justify-content:center}
  body.photo #hud,body.photo #bars,body.photo #objective,body.photo #minimap,body.photo #compass,body.photo #targethp,body.photo .icon-btn,body.photo #audioBtn,body.photo #foot{opacity:0!important;pointer-events:none}
</style>
</head>
<body>
<div id="hud">
  <div id="loc"></div><div id="hint"></div><div id="prompt"></div>
  <div id="lore"><div class="ln"></div><div class="lt"></div><div class="lb"></div></div>
</div>
<div id="cine"><div class="bar top"></div><div class="bar bottom"></div><div class="vig"></div></div>
<div id="grain"></div>
<div id="dev"></div>
<div id="granted"></div>
<div class="stick" id="stickL"><div class="nub"></div></div>
<button class="ui-btn" id="audioBtn">♪ Music</button>
<button class="ui-btn" id="devBtn">⚙ DEV</button>

<div id="devPanel">
  <div class="dp-head"><span>Developer · Grant Elements</span><span id="dpClose">✕</span></div>
  <div id="dpElements"></div>
  <div class="dp-row" style="margin-top:8px">
    <button class="dbtn" id="dpAll">Grant all</button>
    <button class="dbtn" id="dpClear">Clear</button>
  </div>
  <div class="dp-sec">Teleport</div>
  <div class="dp-row" id="dpTeleport"></div>
  <div class="dp-sec">World toggles</div>
  <div class="dp-row"><label>Move speed <input type="range" id="dpSpeed" min="0.5" max="4" step="0.1" value="1"></label></div>
  <div class="dp-row"><label>Daylight <input type="range" id="dpDay" min="0" max="1" step="0.01" value="0.58"></label></div>
  <div class="dp-row">
    <button class="dbtn" id="dpFly">Fly: off</button>
    <button class="dbtn" id="dpFace">Flip hero facing</button>
    <button class="dbtn" id="dpFps">FPS: off</button>
  </div>
  <div class="dp-note">Attuned element (click a granted chip a 2nd time) tints your aura and is
    channelled from the hero's hand on attack (click / Space). Toggle this panel with the DEV button or the <b>`</b> key.</div>
</div>

<div id="veil">
  <div class="kick" id="vkick"></div>
  <h1 id="vtitle"></h1>
  <div class="sub" id="vsub"></div>
  <div class="kick" style="margin-top:1.4em;letter-spacing:.3em" id="vorigin"></div>
  <div id="origins"></div>
  <button class="ui-btn" id="enter"></button>
  <div id="load"></div>
</div>
<div id="foot"></div>

<script src="./vendor/three.min.js"></script>
<script src="./vendor/loaders/GLTFLoader.js"></script>
<script src="./vendor/shaders/CopyShader.js"></script>
<script src="./vendor/shaders/LuminosityHighPassShader.js"></script>
<script src="./vendor/shaders/FXAAShader.js"></script>
<script src="./vendor/postprocessing/EffectComposer.js"></script>
<script src="./vendor/postprocessing/RenderPass.js"></script>
<script src="./vendor/postprocessing/ShaderPass.js"></script>
<script src="./vendor/postprocessing/MaskPass.js"></script>
<script src="./vendor/postprocessing/UnrealBloomPass.js"></script>
<script src="./strings.js"></script>
<script src="./elements.js"></script>
<script src="./rivercity.js"></script>
<script src="./game.js"></script>
</body>
</html>
