name: Deploy game to GitHub Pages

# Publishes the playable 3D game (prototype3d/) to GitHub Pages.
# One-time setup: Settings → Pages → "Build and deployment" → Source: GitHub Actions.
# The game is served at https://<owner>.github.io/<repo>/

on:
  push:
    branches:
      - main
      - claude/higgsfield-terrain-world-srzl4a
    paths:
      - 'prototype3d/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload prototype3d as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototype3d
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
