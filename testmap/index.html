<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>DAO'S FIELD — Test Map (300×300m)</title>
<style>
  :root{--ivory:#efe6d2;--bronze:#c79a5b;--amber:#e8b84a;--ink:#07070a;
    --serif:"Cormorant Garamond","Georgia","Songti SC","STSong","Times New Roman",serif}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--ink);color:var(--ivory);font-family:var(--serif);overflow:hidden;touch-action:none}
  canvas{display:block;position:fixed;inset:0}
  #cine .bar{position:fixed;left:0;right:0;height:6vh;background:#000;z-index:5}
  #cine .top{top:0}#cine .bottom{bottom:0}
  #vig{position:fixed;inset:0;z-index:5;pointer-events:none;background:radial-gradient(130% 110% at 50% 46%,transparent 55%,rgba(0,0,0,.4) 100%)}
  #hint{position:fixed;bottom:calc(6vh + 10px);left:50%;transform:translateX(-50%);z-index:7;font-size:13px;color:#cfc7b4;text-shadow:0 1px 8px #000;opacity:.85;text-align:center;padding:0 12px}
  #title{position:fixed;top:calc(6vh + 10px);left:50%;transform:translateX(-50%);z-index:7;letter-spacing:.34em;text-transform:uppercase;font-size:12px;color:var(--ivory);text-shadow:0 2px 12px #000}
  .label{position:fixed;z-index:6;pointer-events:none;transform:translate(-50%,-50%);color:var(--amber);letter-spacing:.18em;text-transform:uppercase;font-size:12px;text-shadow:0 0 10px rgba(0,0,0,.9),0 2px 6px #000;white-space:nowrap;transition:opacity .3s}
  .label b{color:#efe6d2}
  #dev{position:fixed;top:calc(6vh + 4px);left:6px;color:#6f6;font:12px monospace;z-index:9;display:none}
  .ui-btn{position:fixed;z-index:8;pointer-events:auto;cursor:pointer;font-family:var(--serif);background:linear-gradient(180deg,rgba(199,154,91,.2),rgba(199,154,91,.05));border:1px solid var(--bronze);color:var(--ivory);letter-spacing:.1em;border-radius:2px;padding:.5em 1em;font-size:13px;backdrop-filter:blur(2px)}
  #audioBtn{top:calc(6vh + 8px);right:12px}#flyBtn{top:calc(6vh + 8px);right:120px}
  .stick{position:fixed;bottom:calc(6vh + 24px);left:22px;width:116px;height:116px;border-radius:50%;border:1px solid rgba(239,230,210,.25);z-index:7;display:none}
  .stick .nub{position:absolute;left:50%;top:50%;width:50px;height:50px;margin:-25px 0 0 -25px;border-radius:50%;background:rgba(239,230,210,.18);border:1px solid rgba(239,230,210,.4)}
  body.touch .stick{display:block}
  #veil{position:fixed;inset:0;z-index:20;background:radial-gradient(120% 100% at 50% 30%,#1a2b30,#05060a);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:opacity 1s;padding:24px}
  #veil.gone{opacity:0;pointer-events:none}
  #veil h1{font-size:clamp(34px,8vw,72px);letter-spacing:.14em;margin:.1em 0;font-weight:600;text-shadow:0 3px 24px #000}
  #veil .k{letter-spacing:.4em;text-transform:uppercase;color:var(--bronze);font-size:12px}
  #veil .sub{color:#cfc7b4;font-size:15px;letter-spacing:.1em;margin-top:.4em}
  #bar{margin-top:20px;width:min(320px,70vw);height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
  #bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--bronze),var(--amber));transition:width .3s}
  #loadtxt{margin-top:10px;color:#9c927e;letter-spacing:.18em;font-size:11px;text-transform:uppercase}
  #foot{position:fixed;bottom:4px;left:0;right:0;z-index:20;text-align:center;color:#8a8172;font-size:11px;letter-spacing:.08em;opacity:.6}
</style>
</head>
<body>
<div id="title"></div>
<div id="hint"></div>
<div id="labels"></div>
<div id="cine"><div class="bar top"></div><div class="bar bottom"></div></div>
<div id="vig"></div>
<div id="dev"></div>
<div class="stick" id="stickL"><div class="nub"></div></div>
<button class="ui-btn" id="flyBtn">Fly: Off</button>
<button class="ui-btn" id="audioBtn">♪ Music</button>
<div id="veil">
  <div class="k" id="vk"></div><h1 id="vt"></h1><div class="sub" id="vs"></div>
  <div id="bar"><i></i></div><div id="loadtxt"></div>
</div>
<div id="foot"></div>

<script src="./vendor/three.min.js"></script>
<script src="./vendor/shaders/CopyShader.js"></script>
<script src="./vendor/shaders/LuminosityHighPassShader.js"></script>
<script src="./vendor/shaders/FXAAShader.js"></script>
<script src="./vendor/postprocessing/EffectComposer.js"></script>
<script src="./vendor/postprocessing/RenderPass.js"></script>
<script src="./vendor/postprocessing/ShaderPass.js"></script>
<script src="./vendor/postprocessing/MaskPass.js"></script>
<script src="./vendor/postprocessing/UnrealBloomPass.js"></script>
<script src="./vendor/loaders_GLTFLoader.js"></script>
<script src="./map.js"></script>
</body>
</html>
